services:
  usb-monitor:
    build: .
    container_name: astra-usb-monitor
    privileged: true
    network_mode: host
    pid: host
    volumes:
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /sys:/sys
      - /proc:/proc
      - /run/udev:/run/udev:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./USB_Backups:/app/USB_Backups
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
      - USB_BACKUP_DEST=/app/USB_Backups
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    restart: unless-stopped
