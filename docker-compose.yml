services:
  usb-monitor:
    build:
      context: .
      args:
        # Nanosuit voice stack (torch + coqui-tts, ~3 GB) — off by default
        # because the headless server doesn't play audio. On ARM (Jetson) the
        # native extensions fail to compile. Enable per-host:
        #   INSTALL_VOICE=1 docker compose up -d --build
        INSTALL_VOICE: ${INSTALL_VOICE:-0}
    container_name: astra-usb-monitor
    privileged: true
    network_mode: host
    pid: host
    volumes:
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /sys:/sys
      - /proc:/proc
      - /run/udev:/run/udev:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # X11 auth cookie so the root container may connect to the desktop's
      # X server (:1). Host-scoped cookie + network_mode/pid host => valid here.
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
      - ./USB_Backups:/app/USB_Backups
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
      - USB_BACKUP_DEST=/app/USB_Backups
      # Empty when launched over SSH (-> headless), set to :1 when launched
      # from the desktop terminal (-> GUI). Do NOT hardcode a value.
      - DISPLAY=${DISPLAY-}
      - XAUTHORITY=/root/.Xauthority
      - QT_X11_NO_MITSHM=1
      - ALSA_CARD=0
      # Voice: accept the XTTS license and keep models in the ./data volume so
      # they download only on the first run, not on every container recreate.
      - COQUI_TOS_AGREED=1
      - TTS_HOME=/app/data/tts
    devices:
      - /dev/snd
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    group_add:
      - audio
    restart: unless-stopped
