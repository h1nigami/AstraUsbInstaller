services:
  usb-monitor:
    build:
      context: .
      args:
        # Set to 1 to bake the nanosuit voice stack (torch + coqui-tts, ~3 GB)
        # into the image. Default 0 keeps the image lean; the app still runs and
        # the greeting falls back to espeak. Enable: INSTALL_VOICE=1 docker compose build
        INSTALL_VOICE: ${INSTALL_VOICE:-0}
    container_name: astra-usb-monitor
    privileged: true
    network_mode: host
    pid: host
    volumes:
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /sys:/sys
      - /proc:/proc
      - /run/udev:/run/udev:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./USB_Backups:/app/USB_Backups
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
      - USB_BACKUP_DEST=/app/USB_Backups
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - ALSA_CARD=0
    devices:
      - /dev/snd
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    group_add:
      - audio
    restart: unless-stopped
